version: '3'

services:
  # ===== ISTNIEJĄCE SERWISY N8N =====
  
  postgres:
    image: postgres:15.8
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network

  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - '8443:5678'
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n-mario.space
      # Konfiguracja połączenia z PostgreSQL
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_ENCRYPTION_KEY=klucz_szyfrowania
    volumes:
      - ~/.n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n-network

  # ===== NOWE SERWISY - TRADING BOT =====
  
  trading-bot-backend:
    build: 
      context: ./trading-bot/backend
      dockerfile: Dockerfile
    container_name: trading-bot-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      # Security
      - API_KEY=${API_KEY}
      # App config
      - ENVIRONMENT=production
      - DATABASE_PATH=/app/data/trading_bot.db
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/data/logs/bot.log
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CHECK_INTERVAL=15
      # Backup
      - AUTO_BACKUP=true
      - BACKUP_DIR=/app/data/backups
      - BACKUP_INTERVAL=24
      # Rate limiting
      - RATE_LIMIT_PER_MINUTE=60
      # CORS
      - CORS_ORIGINS=http://localhost:8080,https://trading.n8n-mario.space
    volumes:
      - ./trading-bot/data:/app/data
      - ./trading-bot/.env:/app/.env:ro
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  trading-bot-scheduler:
    build: 
      context: ./trading-bot/backend
      dockerfile: Dockerfile
    container_name: trading-bot-scheduler
    restart: unless-stopped
    command: python -m app.scheduler
    environment:
      # Same as backend
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - API_KEY=${API_KEY}
      - CHECK_INTERVAL=15
      - DATABASE_PATH=/app/data/trading_bot.db
      - LOG_FILE=/app/data/logs/scheduler.log
      - LOG_LEVEL=INFO
    volumes:
      - ./trading-bot/data:/app/data
      - ./trading-bot/.env:/app/.env:ro
    networks:
      - n8n-network
    depends_on:
      trading-bot-backend:
        condition: service_healthy

  trading-bot-frontend:
    image: nginx:alpine
    container_name: trading-bot-frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./trading-bot/frontend:/usr/share/nginx/html:ro
      - ./trading-bot/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - n8n-network
    depends_on:
      - trading-bot-backend

# ===== VOLUMES =====

volumes:
  postgres_data:

# ===== NETWORKS =====

networks:
  n8n-network:
    driver: bridge
