version: '3'

services:
  # ========================================
  # ISTNIEJĄCE SERWISY - NIE ZMIENIAJ
  # ========================================
  
  postgres:
    image: postgres:15.8
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_network

  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - '8443:5678'
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=https://twojadomena-n8n.pl
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_ENCRYPTION_KEY=klucz_szyfrowania
    volumes:
      - ~/.n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n_network

  # ========================================
  # TRADING BOT - NOWE SERWISY
  # ========================================

  trading-bot-backend:
    build: ./trading-bot/backend
    container_name: trading-bot-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ./trading-bot/.env
    volumes:
      - ./trading-bot/data:/app/data
    networks:
      - n8n_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  trading-bot-scheduler:
    build: ./trading-bot/backend
    container_name: trading-bot-scheduler
    restart: unless-stopped
    command: python -m app.scheduler
    env_file:
      - ./trading-bot/.env
    volumes:
      - ./trading-bot/data:/app/data
    networks:
      - n8n_network
    depends_on:
      - trading-bot-backend

  trading-bot-frontend:
    image: nginx:alpine
    container_name: trading-bot-frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./trading-bot/frontend:/usr/share/nginx/html:ro
    networks:
      - n8n_network

# ========================================
# VOLUMES & NETWORKS
# ========================================

volumes:
  postgres_data:

networks:
  n8n_network:
    driver: bridge
