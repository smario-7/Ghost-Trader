[pytest]
testpaths = tests
norecursedirs = .git __pycache__ demos *.egg-info
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    unit: Testy jednostkowe (szybkie, izolowane)
    integration: Testy integracyjne (testują współpracę komponentów)
    e2e: Testy end-to-end (pełny przepływ przez system)
    slow: Wolne testy (>5s)
    api: Testy endpointów API
    database: Testy operacji bazodanowych

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
